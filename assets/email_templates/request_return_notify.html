<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Equipment Return Request</title>
</head>
<body style="font-family: Arial, sans-serif; color: #222; line-height: 1.5;">
  <h2 style="margin: 0 0 12px;">Equipment Return Request</h2>
  <p>A staff member has requested a return to be processed.</p>

  <table style="border-collapse: collapse; width: 100%; max-width: 560px; margin: 12px 0;">
    <tr>
      <td style="padding: 8px; border: 1px solid #ddd; width: 180px;"><strong>Staff</strong></td>
      <td style="padding: 8px; border: 1px solid #ddd;">{staff_name}</td>
    </tr>
    <tr>
      <td style="padding: 8px; border: 1px solid #ddd;"><strong>Equipment</strong></td>
      <td style="padding: 8px; border: 1px solid #ddd;">{equipment_name}</td>
    </tr>
    <tr>
      <td style="padding: 8px; border: 1px solid #ddd;"><strong>Allocation ID</strong></td>
      <td style="padding: 8px; border: 1px solid #ddd;">#{allocation_id}</td>
    </tr>
  </table>

  <p>Please open the admin requests page and process the return.</p>
</body>
</html>
